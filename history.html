<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Transaction History - Swiftlink</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* PAGE STYLES */
        :root {
            --primary: #ff7f00;
            --bg: #fff8f0;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* HEADER */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .back-btn {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        /* TABLE CARD */
        .history-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f9f9f9;
            text-align: left;
            padding: 15px 20px;
            color: #666;
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
            text-transform: uppercase;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid #eee;
            color: #333;
            vertical-align: middle;
        }

        tr:hover {
            background: #fafafa;
        }

        .status-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* BUTTONS */
        .btn-invoice {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            color: #555;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-invoice:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #fff8f0;
        }

        /* INVOICE MODAL */
        #invoiceModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .invoice-box {
            background: white;
            width: 380px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .invoice-header {
            border-bottom: 2px dashed #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #555;
            font-size: 0.95rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #eee;
            font-weight: bold;
            font-size: 1.2rem;
            color: #000;
        }

        .close-icon {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }

        /* PRINT STYLES */
        .btn-print {
            width: 100%;
            margin-top: 25px;
            background: #333;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
        }

        @media print {
            body * {
                visibility: hidden;
            }

            #invoiceModal,
            #invoiceModal * {
                visibility: visible;
            }

            #invoiceModal {
                position: absolute;
                left: 0;
                top: 0;
            }

            .close-icon,
            .btn-print {
                display: none;
            }

            .invoice-box {
                box-shadow: none;
                border: 1px solid #ddd;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-wifi"></i> Swiftlink</div>
        <div class="profile"><i class="fa-regular fa-user-circle"></i> <span id="user-name">Loading...</span></div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div><a href="/dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
                <h2 style="margin: 10px 0 0 0; color: #333;">Transaction History</h2>
            </div>
            <div style="text-align: right; color: #666;"><small>Mobile Number</small><br><b id="display-mobile"
                    style="font-size: 1.1rem; color: var(--primary);">--</b></div>
        </div>

        <div class="history-card">
            <table id="history-table">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Plan Description</th>
                        <th>Status</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="5" style="text-align:center; padding: 40px;">Loading records...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="invoiceModal">
        <div class="invoice-box">
            <span class="close-icon" onclick="closeInvoice()">&times;</span>
            <div class="invoice-header">
                <i class="fa-solid fa-wifi" style="color: #ff7f00; font-size: 2.5rem; margin-bottom: 10px;"></i>
                <h3 style="margin:0; color: #333;">Swiftlink Receipt</h3>
                <small style="color:#28a745; font-weight: 600;">Transaction Successful</small>
            </div>
            <div class="invoice-row"><span>Date:</span> <span id="inv-date">--</span></div>
            <div class="invoice-row"><span>Mobile Number:</span> <span id="inv-mobile">--</span></div>
            <div class="invoice-row"><span>Plan Details:</span> <span id="inv-desc">--</span></div>
            <div class="invoice-row"><span>Payment Mode:</span> <span id="inv-mode"
                    style="text-transform: uppercase; font-weight: bold; color: #333;">--</span></div>
            <div class="total-row"><span>Total Paid</span><span style="color: #ff7f00;" id="inv-amount">₹0</span></div>
            <button class="btn-print" onclick="window.print()"><i class="fa-solid fa-print"></i> Print Invoice</button>
        </div>
    </div>

    <script>
        const sessionMobile = "{{ session.get('user_mobile', '1123456789') }}";

        document.addEventListener('DOMContentLoaded', () => {
            fetch(`/api/user/${sessionMobile}`)
                .then(res => res.json())
                .then(user => {
                    if (!user.error) {
                        document.getElementById('user-name').innerText = user.name;
                        document.getElementById('display-mobile').innerText = sessionMobile;
                        loadHistory(sessionMobile);
                    }
                });
        });

        function loadHistory(mobile) {
            fetch(`/api/history/${mobile}`)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('table-body');
                    tbody.innerHTML = '';

                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">No transactions found.</td></tr>';
                        return;
                    }

                    // DEBUG: Check console to see what the database actually returns
                    console.log("History Data Received:", data);

                    data.forEach(row => {
                        const dateParts = row.date.split(" ");

                        // --- FAIL-SAFE MODE DETECTION ---
                        let displayMode = "UPI / Card"; // Default

                        // Check if 'payment_mode' exists in the database row
                        if (row.payment_mode && row.payment_mode !== "Unknown") {
                            displayMode = row.payment_mode;
                        }

                        const html = `
                        <tr>
                            <td><div style="font-weight:600;">${dateParts[0]}</div><small style="color:#888;">${dateParts[1] || ''}</small></td>
                            <td>${row.plan_data || 'Voice + Data Pack'}</td>
                            <td><span class="status-badge">Success</span></td>
                            <td style="font-weight:bold;">₹${row.plan_price}</td>
                            <td>
                                <button class="btn-invoice" onclick="openInvoice('${row.date}', '${row.plan_price}', '${row.plan_data}', '${mobile}', '${displayMode}')">
                                    <i class="fa-solid fa-file-invoice"></i> View
                                </button>
                            </td>
                        </tr>
                    `;
                        tbody.innerHTML += html;
                    });
                });
        }

        function openInvoice(date, amount, desc, mobile, mode) {
            document.getElementById('inv-date').innerText = date;
            document.getElementById('inv-amount').innerText = "₹" + amount;
            document.getElementById('inv-desc').innerText = desc;
            document.getElementById('inv-mobile').innerText = mobile;
            document.getElementById('inv-mode').innerText = mode.toUpperCase();
            document.getElementById('invoiceModal').style.display = 'flex';
        }

        function closeInvoice() { document.getElementById('invoiceModal').style.display = 'none'; }
        window.onclick = function (event) { if (event.target == document.getElementById('invoiceModal')) closeInvoice(); }
    </script>
</body>

</html>
