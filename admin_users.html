<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Users - Swiftlink Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff7f00;
            --bg: #fff8f0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: white;
            padding: 20px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 40px;
        }

        .menu-item {
            padding: 12px;
            margin-bottom: 5px;
            color: #666;
            cursor: pointer;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .menu-item:hover,
        .menu-item.active {
            background: #fff3e0;
            color: var(--primary);
            font-weight: bold;
        }

        .content {
            margin-left: 290px;
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            background: #f9f9f9;
            color: #666;
            font-size: 0.9rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .btn-danger {
            background: #ffebee;
            color: #d32f2f;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-danger:hover {
            background: #ffcdd2;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-wifi"></i> Swiftlink Admin</div>
        <a href="/admin/dashboard" class="menu-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="/admin/users" class="menu-item active"><i class="fa-solid fa-users"></i> Users</a>
        <a href="/admin/settings" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
        <a href="/admin/logout" class="menu-item" style="margin-top: auto; color: #d32f2f;"><i
                class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>

    <div class="content">
        <h2 style="margin-top:0;">Registered Users</h2>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>City / Circle</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td style="font-weight:bold;">{{ user.name }}</td>
                        <td>{{ user.mobile_no }}</td>
                        <td>{{ user.city }}</td>
                        <td>
                            <button class="btn-danger" onclick="deleteUser('{{ user.mobile_no }}')">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-wifi"></i> Swiftlink Admin</div>
        <a href="/admin/dashboard" class="menu-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="/admin/users" class="menu-item"><i class="fa-solid fa-users"></i> Users</a>

        <a href="/admin/requests" class="menu-item"><i class="fa-solid fa-inbox"></i> Requests</a>

        <a href="/admin/settings" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
        <a href="/admin/logout" class="menu-item" style="margin-top: auto; color: #d32f2f;">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>

    <script>
        function deleteUser(mobile) {
            if (confirm(`Are you sure you want to delete user ${mobile}? This cannot be undone.`)) {
                fetch(`/admin/delete_user/${mobile}`, { method: 'DELETE' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'Deleted') window.location.reload();
                    });
            }
        }
    </script>

</body>

</html>
