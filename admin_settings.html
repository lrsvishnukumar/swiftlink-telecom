<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Settings - Swiftlink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff7f00;
            --bg: #fff8f0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: white;
            padding: 20px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 40px;
        }

        .menu-item {
            padding: 12px;
            margin-bottom: 5px;
            color: #666;
            cursor: pointer;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .menu-item:hover,
        .menu-item.active {
            background: #fff3e0;
            color: var(--primary);
            font-weight: bold;
        }

        .content {
            margin-left: 290px;
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            max-width: 600px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-outline {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            width: fit-content;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-wifi"></i> Swiftlink Admin</div>
        <a href="/admin/dashboard" class="menu-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="/admin/users" class="menu-item"><i class="fa-solid fa-users"></i> Users</a>
        <a href="/admin/settings" class="menu-item active"><i class="fa-solid fa-gear"></i> Settings</a>
        <a href="/admin/logout" class="menu-item" style="margin-top: auto; color: #d32f2f;"><i
                class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>

    <div class="content">
        <h2 style="margin-top:0;">Admin Settings</h2>

        <div class="card">
            <h3 style="margin-top:0;">Change Admin Password</h3>
            <p style="color:#666;">Update your login credentials securely.</p>
            <input type="password" id="newPass" placeholder="Enter New Password">
            <button class="btn-primary" onclick="updatePassword()">Update Password</button>
        </div>


    </div>
    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-wifi"></i> Swiftlink Admin</div>
        <a href="/admin/dashboard" class="menu-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="/admin/users" class="menu-item"><i class="fa-solid fa-users"></i> Users</a>

        <a href="/admin/requests" class="menu-item"><i class="fa-solid fa-inbox"></i> Requests</a>

        <a href="/admin/settings" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
        <a href="/admin/logout" class="menu-item" style="margin-top: auto; color: #d32f2f;">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
    <div class="card">
        <h3><i class="fa-solid fa-database"></i> Database Maintenance</h3>
        <p style="color: #666; font-size: 0.9rem;">Delete recharge history older than 6 months to save space.</p>
        <button onclick="clearOldHistory()" class="btn btn-danger">
            <i class="fa-solid fa-trash-can"></i> Clear Old Logs
        </button>
    </div>

    <script>
        function updateAdminPassword() {
            const newPass = document.getElementById('admin_new_password').value;

            if (!newPass) {
                alert("Please enter a new password");
                return;
            }

            fetch('/admin/update_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_password: newPass })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'Success') {
                        alert(data.message);
                        location.reload();
                    } else {
                        alert("Error: " + data.error);
                    }
                });
        }
        function clearOldHistory() {
            if (confirm("Are you sure? This will delete all transaction records older than 180 days.")) {
                fetch('/admin/clear_old_history', { method: 'POST' })
                    .then(res => res.json())
                    .then(data => alert(data.status || data.error));
            }
        }
    </script>

    <script>
        function updatePassword() {
            const pass = document.getElementById('newPass').value;
            if (!pass) { alert("Please enter a password"); return; }

            fetch('/admin/update_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_password: pass })
            }).then(res => res.json()).then(data => {
                if (data.status === "Success") {
                    alert("Password Updated Successfully!");
                    document.getElementById('newPass').value = "";
                }
            });
        }
    </script>

</body>

</html>
